steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'backend/Dockerfile.doc-graph-worker', '-t', 'us-east4-docker.pkg.dev/ragbox-sovereign-prod/ragbox/doc-graph-worker:$SHORT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east4-docker.pkg.dev/ragbox-sovereign-prod/ragbox/doc-graph-worker:$SHORT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args: ['gcloud', 'run', 'deploy', 'doc-graph-worker', '--image', 'us-east4-docker.pkg.dev/ragbox-sovereign-prod/ragbox/doc-graph-worker:$SHORT_SHA', '--region', 'us-east4', '--min-instances=0', '--max-instances=5', '--memory=512Mi', '--timeout=300']
